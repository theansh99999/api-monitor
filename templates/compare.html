<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Comparison</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h5 class="sidebar-title">
                <i class="bi bi-speedometer2"></i>
                <span>API Monitor</span>
            </h5>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/" class="nav-link"><i class="bi bi-house-door"></i> Dashboard</a></li>
            <li><a href="/projects" class="nav-link"><i class="bi bi-diagram-3"></i> Projects</a></li>
            <li><a href="/logs" class="nav-link"><i class="bi bi-journal-text"></i> Logs</a></li>
            <li><a href="/compare" class="nav-link active"><i class="bi bi-pie-chart"></i> Compare</a></li>
        </ul>
    </nav>

    <!-- Top Navbar (only theme toggle) -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <div class="ms-auto">
            <button id="theme-toggle" class="btn btn-sm btn-outline-light">
                🌙
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid">

            <!-- Comparison Metrics -->
            <div id="comparison-metrics" style="display: none;">
                <div class="row mb-4" id="metrics-row">
                    <!-- Dynamically populated with comparison metrics -->
                </div>
            </div>

            <!-- No Selection Message -->
            <div id="no-selection" class="alert alert-info">
                <h4 class="fw-bold">No APIs Selected</h4>
                <p>Select APIs from Dashboard to compare performance.</p>
            </div>

            <!-- Response Time Comparison Chart -->
            <div class="row mb-4" id="response-time-section" style="display: none;">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Response Time Comparison (Last 24 Hours)</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="responseTimeComparison" height="80"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Uptime Comparison Chart -->
            <div class="row mb-4" id="uptime-section" style="display: none;">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Uptime Comparison (Last 24 Hours)</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="uptimeComparison" height="80"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Comparison Table -->
            <div class="row mb-4" id="comparison-table-section" style="display: none;">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Detailed Comparison</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped" id="comparison-table">
                                    <thead style="background-color:#2d333b; color:#e6edf3;">
                                        <tr>
                                            <th>API Name</th>
                                            <th>URL</th>
                                            <th>Avg Response Time (ms)</th>
                                            <th>Uptime %</th>
                                            <th>Total Checks</th>
                                        </tr>
                                    </thead>
                                    <tbody id="comparison-tbody">
                                        <!-- Dynamically populated -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Compare JS -->
    <script src="{{ url_for('static', filename='compare.js') }}"></script>
</body>

</html>
