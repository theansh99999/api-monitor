<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Monitoring Logs</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h5 class="sidebar-title">
                <i class="bi bi-speedometer2"></i>
                <span>API Monitor</span>
            </h5>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a href="/" class="nav-link">
                    <i class="bi bi-house-door"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/projects" class="nav-link">
                    <i class="bi bi-diagram-3"></i>
                    <span>Projects</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/logs" class="nav-link active">
                    <i class="bi bi-journal-text"></i>
                    <span>Logs</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/compare" class="nav-link">
                    <i class="bi bi-pie-chart"></i>
                    <span>Compare</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Top Navbar (only theme toggle) -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <div class="ms-auto">
            <button id="theme-toggle" class="btn btn-sm btn-outline-light" title="Toggle theme">
                🌙
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-content">
        <div class="container-fluid">

            <!-- Filters -->
            <div class="row mb-4">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Filter Logs</h5>
                        </div>
                        <div class="card-body">
                            <form id="filter-form">
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="filter-api" class="form-label">API Name</label>
                                        <select class="form-select" id="filter-api">
                                            <option value="">All APIs</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="filter-status" class="form-label">Status</label>
                                        <select class="form-select" id="filter-status">
                                            <option value="">All Statuses</option>
                                            <option value="UP">UP</option>
                                            <option value="DOWN">DOWN</option>
                                            <option value="ERROR">ERROR</option>
                                            <option value="SLOW">SLOW</option>
                                        </select>
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="filter-start-date" class="form-label">Start Date</label>
                                        <input type="date" class="form-control" id="filter-start-date">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="filter-end-date" class="form-label">End Date</label>
                                        <input type="date" class="form-control" id="filter-end-date">
                                    </div>
                                    <div class="col-md-2 d-flex gap-2 align-items-end mb-3">
                                        <button type="button" class="btn btn-primary w-100" onclick="applyFilters()">
                                            <i class="bi bi-funnel"></i> Filter
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center w-100">

                            <h5 class="mb-0">Monitoring Logs</h5>

                            <div class="d-flex align-items-center gap-2">

                                <button class="btn btn-sm btn-outline-light" onclick="downloadLogs()">
                                    <i class="bi bi-download"></i> Download
                                </button>

                                <span id="log-count" class="badge bg-light text-dark"></span>

                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="logs-table">
                                <thead style="background-color:#2d333b; color:#e6edf3;">
                                    <tr>
                                        <th>API Name</th>
                                        <th>Status</th>
                                        <th>Status Code</th>
                                        <th>Response Time (ms)</th>
                                        <th>Error Message</th>
                                        <th>Severity</th>
                                        <th>Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="logs-tbody">
                                    <!-- Dynamically populated -->
                                </tbody>
                            </table>
                            <div id="no-logs" class="text-center text-muted py-4">
                                <p>No logs found.</p>
                            </div>
                        </div>

                        <!-- Pagination -->
                        <nav aria-label="Page navigation" id="pagination-nav" style="display: none;">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" id="prev-btn">
                                    <a class="page-link" href="#" onclick="previousPage(); return false;">Previous</a>
                                </li>
                                <li class="page-item disabled">
                                    <span class="page-link">Page <span id="current-page">1</span> of <span
                                            id="total-pages">1</span></span>
                                </li>
                                <li class="page-item" id="next-btn">
                                    <a class="page-link" href="#" onclick="nextPage(); return false;">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Logs JS -->
    <script src="{{ url_for('static', filename='logs.js') }}"></script>
</body>

</html>
